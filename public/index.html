<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lufie · İmalat Sipariş Panosu</title>
  <style>
    :root {
      --bg: #0e1116;
      --surface: #171b22;
      --surface-2: #1e242d;
      --border: #2a313c;
      --ink: #f2f5f9;
      --ink-2: #aeb7c4;
      --ink-3: #6b7482;
      --accent: #4c9ffe;
      --good: #3fb27f;
      --warning: #e0a642;
      --critical: #e5544b;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--ink); font-family: var(--font);
      padding: clamp(16px, 2vw, 32px); min-height: 100vh;
    }
    header {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: clamp(16px, 2vw, 28px);
    }
    header h1 { font-size: clamp(20px, 2.4vw, 30px); letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); }
    .meta { color: var(--ink-3); font-size: 14px; text-align: right; }
    .meta .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--good); margin-right: 6px; vertical-align: middle; }
    .meta .dot.stale { background: var(--warning); }

    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: clamp(12px, 1.4vw, 20px); margin-bottom: clamp(16px, 2vw, 28px); }
    .kpi { background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: clamp(18px, 1.8vw, 28px); position: relative; overflow: hidden; }
    .kpi .label { color: var(--ink-2); font-size: clamp(13px, 1vw, 15px);
      text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .kpi .value { font-size: clamp(48px, 7vw, 96px); font-weight: 800; line-height: 1;
      margin: 10px 0 4px; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
    .kpi .sub { color: var(--ink-3); font-size: clamp(13px, 1vw, 15px); }
    .kpi .breakdown { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .kpi .breakdown span { color: var(--ink-2); font-size: clamp(12px, 0.9vw, 14px); }
    .kpi .breakdown b { color: var(--ink); font-variant-numeric: tabular-nums; }
    .kpi.accent .value { color: var(--accent); }
    .kpi.good .value { color: var(--good); }
    .kpi.remaining .value { color: var(--warning); }
    .kpi .value .vunit { font-size: clamp(13px, 1vw, 16px); font-weight: 600;
      color: var(--ink-3); margin-left: 8px; letter-spacing: 0; }

    /* sipariş / ürün adedi şalteri */
    .metricbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: clamp(12px, 1.4vw, 18px); }
    .metricbar .mlabel { color: var(--ink-3); font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.06em; font-weight: 600; }
    .seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 3px; gap: 2px; }
    .seg button { background: none; border: none; color: var(--ink-2); font: inherit;
      font-size: 14px; font-weight: 600; padding: 7px 16px; border-radius: 8px; cursor: pointer; }
    .seg button.active { background: var(--accent); color: #fff; }
    .seg button:not(.active):hover { color: var(--ink); }
    .metricbar .navlink { margin-left: auto; color: var(--accent); text-decoration: none;
      font-size: 14px; font-weight: 700; background: var(--surface); border: 1px solid var(--border);
      padding: 9px 14px; border-radius: 10px; white-space: nowrap; }
    .metricbar .navlink:hover { background: var(--surface-2); }

    /* günlük hız barı */
    .bar { height: 10px; border-radius: 999px; background: var(--surface-2);
      overflow: hidden; margin-top: 14px; }
    .bar > i { display: block; height: 100%; background: var(--good); border-radius: 999px;
      transition: width .6s ease; }

    .panels { display: grid; grid-template-columns: 1fr; gap: clamp(16px, 2vw, 24px); }
    @media (min-width: 1100px) { .panels { grid-template-columns: 1fr 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
    .panel > h2 { font-size: clamp(15px, 1.3vw, 19px); padding: 16px 20px;
      border-bottom: 1px solid var(--border); display: flex; align-items: center;
      justify-content: space-between; gap: 10px; }
    .panel > h2 .count { background: var(--surface-2); color: var(--ink-2);
      font-size: 14px; padding: 3px 12px; border-radius: 999px; font-weight: 700; }
    .panel > h2 .count.alert { background: rgba(229,84,75,.15); color: var(--critical); }
    .scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 16px; font-size: clamp(13px, 1vw, 16px);
      border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { color: var(--ink-3); font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.05em; position: sticky; top: 0; background: var(--surface); }
    tbody tr:last-child td { border-bottom: none; }
    td.num { font-variant-numeric: tabular-nums; text-align: right; }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px;
      border-radius: 999px; font-size: 12px; font-weight: 700; }
    .tag.critical { background: rgba(229,84,75,.15); color: var(--critical); }
    .tag.warning { background: rgba(224,166,66,.15); color: var(--warning); }
    .tag.acil { background: rgba(229,84,75,.15); color: var(--critical); }
    .empty { padding: 28px 20px; color: var(--ink-3); text-align: center; }
    .notice { background: rgba(224,166,66,.1); border: 1px solid rgba(224,166,66,.3);
      color: var(--warning); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px; }
    .err { background: rgba(229,84,75,.1); border: 1px solid rgba(229,84,75,.3);
      color: var(--critical); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px; }

    /* müşteri adı (sipariş no altında) */
    td .cust { display: block; color: var(--ink-3); font-size: clamp(11px, 0.85vw, 13px);
      margin-top: 3px; white-space: nowrap; }
    /* tıklanabilir adet hücresi */
    td.qty { cursor: pointer; }
    td.qty .q { display: inline-flex; align-items: center; gap: 6px; justify-content: flex-end;
      font-variant-numeric: tabular-nums; border-bottom: 1px dashed var(--ink-3); padding-bottom: 1px; }
    td.qty:hover .q { color: var(--accent); border-color: var(--accent); }
    td.qty .q svg { width: 14px; height: 14px; opacity: .7; }
    /* acil tablosundaki ürün detay butonu */
    .prodbtn { background: none; border: none; color: var(--ink-3); cursor: pointer;
      padding: 2px 4px; margin-left: 6px; vertical-align: middle; border-radius: 6px; line-height: 0; }
    .prodbtn svg { width: 15px; height: 15px; }
    .prodbtn:hover { color: var(--accent); background: var(--surface-2); }

    /* alt grafikler */
    .charts { display: grid; grid-template-columns: 1fr; gap: clamp(16px, 2vw, 24px);
      margin-top: clamp(16px, 2vw, 24px); }
    @media (min-width: 1100px) { .charts { grid-template-columns: 1fr 1fr; } }
    .chartwrap { padding: 14px 16px 10px; }
    .chartwrap svg { width: 100%; height: auto; display: block; }
    .legend { font-size: 13px; font-weight: 500; color: var(--ink-2);
      display: inline-flex; align-items: center; gap: 6px; }
    .legend i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
    .legend i.lg-recv { background: var(--accent); }
    .legend i.lg-ship { background: var(--good); }
    .legend .sep { width: 8px; }
    .chart-note { color: var(--ink-3); font-size: 13px; text-align: center; padding: 30px 12px; }

    /* ürün detay pop-up'ı */
    .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
    .modal-back.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      width: min(560px, 100%); max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal .mhead { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .modal .mhead h3 { font-size: 17px; letter-spacing: -0.01em; }
    .modal .mhead .msub { color: var(--ink-3); font-size: 13px; margin-top: 4px; }
    .modal .mclose { background: var(--surface-2); border: 1px solid var(--border); color: var(--ink-2);
      width: 32px; height: 32px; border-radius: 8px; font-size: 18px; line-height: 1; cursor: pointer; flex: none; }
    .modal .mclose:hover { color: var(--ink); }
    .modal .mbody { overflow-y: auto; }
    .modal .item { display: flex; align-items: center; gap: 14px; padding: 14px 20px;
      border-bottom: 1px solid var(--border); }
    .modal .item:last-child { border-bottom: none; }
    .modal .item .qbadge { flex: none; min-width: 40px; height: 40px; padding: 0 10px; border-radius: 10px;
      background: var(--surface-2); color: var(--ink); font-weight: 800; font-size: 17px;
      display: flex; align-items: center; justify-content: center; font-variant-numeric: tabular-nums; }
    .modal .item .pname { font-size: 15px; font-weight: 600; }
    .modal .item .pmeta { color: var(--ink-3); font-size: 13px; margin-top: 3px;
      display: flex; gap: 12px; flex-wrap: wrap; }
    .modal .item .pmeta b { color: var(--ink-2); font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <h1><span>Lufie</span> · İmalat Sipariş Panosu</h1>
    <div class="meta">
      <div><span class="dot" id="statusDot"></span><span id="updated">yükleniyor…</span></div>
      <div id="clock"></div>
    </div>
  </header>

  <div id="messages"></div>

  <div class="metricbar">
    <span class="mlabel">Gösterim</span>
    <div class="seg" id="metricToggle">
      <button type="button" data-mode="orders">Sipariş adedi</button>
      <button type="button" data-mode="units" class="active">Ürün adedi</button>
    </div>
    <a class="navlink" href="/renkler">🎨 Renk / Numara Kırılımı →</a>
  </div>

  <section class="kpis" id="kpis"></section>

  <section class="charts">
    <div class="panel">
      <h2>Gelen vs Kargolanan — Son 7 Gün
        <span class="legend"><i class="lg-recv"></i>Gelen<span class="sep"></span><i class="lg-ship"></i>Kargolanan</span>
      </h2>
      <div class="chartwrap" id="chartFlow"></div>
    </div>
    <div class="panel">
      <h2>Açık Kuyruk Trendi — Son 7 Gün <span class="count" id="backlogNow">—</span></h2>
      <div class="chartwrap" id="chartBacklog"></div>
    </div>
  </section>

  <section class="panels">
    <div class="panel">
      <h2>⏰ Gecikmede / Bugün Terminli — Trendyol <span class="count" id="delayCount">0</span></h2>
      <div class="scroll">
        <table>
          <thead><tr><th>Sipariş No</th><th>Durum</th><th>Termin</th><th class="num">Adet</th></tr></thead>
          <tbody id="delayBody"></tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h2>🔴 Acil Etiketli — Shopify <span class="count" id="urgentCount">0</span></h2>
      <div class="scroll">
        <table>
          <thead><tr><th>Sipariş</th><th>Müşteri</th><th>Alınma</th></tr></thead>
          <tbody id="urgentBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <div class="modal-back" id="modalBack">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="mhead">
        <div>
          <h3 id="modalTitle">Sipariş</h3>
          <div class="msub" id="modalSub"></div>
        </div>
        <button class="mclose" id="modalClose" aria-label="Kapat">×</button>
      </div>
      <div class="mbody" id="modalBody"></div>
    </div>
  </div>

  <script>
    const fmtDate = (ts) => {
      if (!ts) return '—';
      const d = new Date(ts);
      return d.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', timeZone: 'Europe/Istanbul' });
    };
    const fmtDateTime = (iso) => {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('tr-TR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul' });
    };
    // Termin: tarih + saat (ms timestamp)
    const fmtDeadline = (ts) => {
      if (!ts) return '—';
      return new Date(ts).toLocaleString('tr-TR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul' });
    };

    let metricMode = 'units'; // default: ürün adedi | 'orders' = sipariş adedi
    let lastData = null;

    function renderKpis(d) {
      lastData = d;
      const t = d.totals || {};
      const rt = d.trendyol || {}, sh = d.shopify || {};
      const units = metricMode === 'units';
      const unit = units ? 'ürün' : 'sipariş';

      // toplam metrik değeri (mode'a göre sipariş sayısı ya da ürün adedi)
      const received = units ? (t.receivedUnits || 0) : (t.receivedToday || 0);
      const shipped = units ? (t.shippedUnits || 0) : (t.shippedToday || 0);
      const remaining = units ? (t.openUnits || 0) : (t.openTotal || 0);
      const pct = received > 0 ? Math.min(100, Math.round((shipped / received) * 100)) : 0;
      // platform kırılımı (mode'a göre ...Units ya da ...Today alanını seçer)
      const bd = (o, k) => { const v = units ? o[k + 'Units'] : o[k + 'Today']; return v ?? '–'; };

      document.getElementById('kpis').innerHTML = `
        <div class="kpi accent">
          <div class="label">Bugün Gelen</div>
          <div class="value">${received}<span class="vunit">${unit}</span></div>
          <div class="breakdown">
            <span>Trendyol <b>${bd(rt, 'received')}</b></span>
            <span>Shopify <b>${bd(sh, 'received')}</b></span>
          </div>
        </div>
        <div class="kpi good">
          <div class="label">Bugün Kargoya Verilen</div>
          <div class="value">${shipped}<span class="vunit">${unit}</span></div>
          <div class="breakdown">
            <span>Trendyol <b>${bd(rt, 'shipped')}</b></span>
            <span>Shopify <b>${bd(sh, 'shipped')}</b></span>
          </div>
          <div class="bar"><i style="width:${pct}%"></i></div>
          <div class="sub" style="margin-top:8px">Bugün gelenlerin <b>%${pct}</b>'i kargolandı</div>
        </div>
        <div class="kpi remaining">
          <div class="label">Açık · Kargolanmamış</div>
          <div class="value">${remaining}<span class="vunit">${unit}</span></div>
          <div class="sub">Bekleyen tüm Trendyol siparişi (bugün gelenler dahil)</div>
        </div>`;
    }

    document.getElementById('metricToggle').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-mode]');
      if (!btn) return;
      metricMode = btn.dataset.mode;
      document.querySelectorAll('#metricToggle button').forEach((b) =>
        b.classList.toggle('active', b.dataset.mode === metricMode));
      if (lastData) { renderKpis(lastData); renderHistory(lastData.history); } // anında güncelle
    });

    // --- Alt grafikler (son 7 gün) ---
    const histDayLabel = (dateStr) =>
      new Date(dateStr + 'T12:00:00+03:00')
        .toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', timeZone: 'Europe/Istanbul' });

    function renderHistory(series) {
      series = series || [];
      renderFlow(series);
      renderBacklog(series);
    }

    function renderFlow(series) {
      const el = document.getElementById('chartFlow');
      const uKey = metricMode === 'units' ? 'Units' : 'Orders';
      const rows = series.map((r) => ({ date: r.date, recv: r['received' + uKey], ship: r['shipped' + uKey] }));
      if (!rows.length) { el.innerHTML = `<div class="chart-note">Veri yok</div>`; return; }
      const maxV = Math.max(1, ...rows.flatMap((r) => [r.recv || 0, r.ship || 0]));

      const W = 720, H = 250, padL = 10, padR = 10, padT = 22, padB = 56;
      const plotH = H - padT - padB, plotW = W - padL - padR, baseY = padT + plotH;
      const groupW = plotW / rows.length;
      const barW = Math.min(24, groupW * 0.28);
      const gap = 5;

      let bars = '', labels = '', nets = '';
      const bar = (val, xLeft, color) => {
        if (val == null) return '';
        const h = (val / maxV) * plotH, y = baseY - h;
        return `<rect x="${xLeft}" y="${y}" width="${barW}" height="${Math.max(0, h)}" rx="4" fill="${color}"/>`
          + `<text x="${xLeft + barW / 2}" y="${y - 5}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--ink-2)">${val}</text>`;
      };
      rows.forEach((r, i) => {
        const cx = padL + groupW * (i + 0.5);
        bars += bar(r.recv, cx - barW - gap / 2, 'var(--accent)');
        bars += bar(r.ship, cx + gap / 2, 'var(--good)');
        labels += `<text x="${cx}" y="${baseY + 16}" text-anchor="middle" font-size="12" fill="var(--ink-3)">${histDayLabel(r.date)}</text>`;
        if (r.recv != null && r.ship != null) {
          const net = r.ship - r.recv, pos = net >= 0;
          nets += `<text x="${cx}" y="${baseY + 36}" text-anchor="middle" font-size="13" font-weight="800" fill="${pos ? 'var(--good)' : 'var(--critical)'}">${pos ? '+' : ''}${net}</text>`;
        } else {
          nets += `<text x="${cx}" y="${baseY + 36}" text-anchor="middle" font-size="12" fill="var(--ink-3)">—</text>`;
        }
      });

      el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Gelen ve kargolanan, son 7 gün">
        <line x1="${padL}" y1="${baseY}" x2="${W - padR}" y2="${baseY}" stroke="var(--border)" stroke-width="1"/>
        ${bars}${labels}${nets}
      </svg>
      <div class="chart-note" style="padding:2px 0 0">Net = kargolanan − gelen · <b style="color:var(--good)">+</b> gelenden fazla çıktı · <b style="color:var(--critical)">−</b> kuyruk büyüdü</div>`;
    }

    function renderBacklog(series) {
      const el = document.getElementById('chartBacklog');
      const uKey = metricMode === 'units' ? 'Units' : 'Orders';
      const unit = metricMode === 'units' ? 'ürün' : 'sipariş';
      const pts = series.map((r, i) => ({ i, date: r.date, v: r['open' + uKey] })).filter((p) => p.v != null);
      const now = pts.length ? pts[pts.length - 1].v : null;
      document.getElementById('backlogNow').textContent = now != null ? `${now} ${unit}` : '—';

      const W = 720, H = 250, padL = 40, padR = 16, padT = 22, padB = 40;
      const plotH = H - padT - padB, plotW = W - padL - padR, baseY = padT + plotH;
      const n = series.length;
      const xAt = (i) => padL + (plotW * (i + 0.5)) / n;
      const xlabels = series.map((r, i) => `<text x="${xAt(i)}" y="${baseY + 16}" text-anchor="middle" font-size="12" fill="var(--ink-3)">${histDayLabel(r.date)}</text>`).join('');

      if (pts.length < 2) {
        let dot = '';
        if (pts.length === 1) {
          const p = pts[0];
          dot = `<circle cx="${xAt(p.i)}" cy="${padT + plotH / 2}" r="5" fill="var(--warning)"/>
            <text x="${xAt(p.i)}" y="${padT + plotH / 2 - 12}" text-anchor="middle" font-size="13" font-weight="700" fill="var(--ink-2)">${p.v}</text>`;
        }
        el.innerHTML = `<svg viewBox="0 0 ${W} ${H}">
          <line x1="${padL}" y1="${baseY}" x2="${W - padR}" y2="${baseY}" stroke="var(--border)"/>
          ${xlabels}${dot}
        </svg>
        <div class="chart-note">Kuyruk trendi her gün bir nokta ekler — veri birikiyor. Birkaç gün sonra 7 günlük eğri oluşacak.</div>`;
        return;
      }

      const vals = pts.map((p) => p.v);
      let lo = Math.min(...vals), hi = Math.max(...vals);
      const padv = Math.max(4, Math.round((hi - lo) * 0.2));
      lo = Math.max(0, lo - padv); hi = hi + padv;
      const yAt = (v) => padT + plotH - ((v - lo) / (hi - lo || 1)) * plotH;

      const line = pts.map((p, k) => `${k ? 'L' : 'M'}${xAt(p.i).toFixed(1)} ${yAt(p.v).toFixed(1)}`).join(' ');
      const area = `M${xAt(pts[0].i).toFixed(1)} ${baseY} ` +
        pts.map((p) => `L${xAt(p.i).toFixed(1)} ${yAt(p.v).toFixed(1)}`).join(' ') +
        ` L${xAt(pts[pts.length - 1].i).toFixed(1)} ${baseY} Z`;
      const dots = pts.map((p) => `<circle cx="${xAt(p.i)}" cy="${yAt(p.v)}" r="4.5" fill="var(--warning)" stroke="var(--surface)" stroke-width="2"/>
        <text x="${xAt(p.i)}" y="${yAt(p.v) - 10}" text-anchor="middle" font-size="12" font-weight="700" fill="var(--ink-2)">${p.v}</text>`).join('');

      el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Açık kuyruk trendi son 7 gün">
        <line x1="${padL}" y1="${baseY}" x2="${W - padR}" y2="${baseY}" stroke="var(--border)"/>
        <text x="${padL - 6}" y="${yAt(hi) + 4}" text-anchor="end" font-size="11" fill="var(--ink-3)">${hi}</text>
        <text x="${padL - 6}" y="${yAt(lo) + 4}" text-anchor="end" font-size="11" fill="var(--ink-3)">${lo}</text>
        <path d="${area}" fill="var(--warning)" fill-opacity="0.13"/>
        <path d="${line}" fill="none" stroke="var(--warning)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}${xlabels}
      </svg>`;
    }

    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const boxIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`;

    let delayedList = [];
    function renderDelayed(list) {
      delayedList = list || [];
      list = delayedList;
      const body = document.getElementById('delayBody');
      document.getElementById('delayCount').textContent = list.length;
      document.getElementById('delayCount').className = 'count' + (list.length ? ' alert' : '');
      if (!list.length) { body.innerHTML = `<tr><td colspan="4"><div class="empty">Gecikmede sipariş yok 🎉</div></td></tr>`; return; }
      body.innerHTML = list.map((o, i) => `
        <tr>
          <td>${esc(o.orderNumber)}${o.customer ? `<span class="cust">${esc(o.customer)}</span>` : ''}</td>
          <td>${esc(o.status || '—')}</td>
          <td><span class="tag ${o.overdue ? 'critical' : 'warning'}">${o.overdue ? 'Gecikmiş' : 'Bugün'} · ${fmtDeadline(o.deadline)}</span></td>
          <td class="qty num" data-index="${i}" title="Ürün detayını gör"><span class="q">${o.quantity || 0}${boxIcon}</span></td>
        </tr>`).join('');
    }

    // --- Ürün detay pop-up'ı ---
    const modalBack = document.getElementById('modalBack');
    function openProductModal(o) {
      const items = o.items || [];
      const totalQty = o.quantity != null ? o.quantity : items.reduce((s, it) => s + (it.quantity || 0), 0);
      document.getElementById('modalTitle').textContent = 'Sipariş ' + (o.orderNumber || o.name || '');
      const bits = [o.customer, o.status, 'Toplam ' + totalQty + ' adet'].filter(Boolean);
      document.getElementById('modalSub').textContent = bits.join(' · ');
      document.getElementById('modalBody').innerHTML = items.length
        ? items.map((it) => {
            const meta = [
              it.color ? `<span><b>Renk:</b> ${esc(it.color)}</span>` : '',
              it.size ? `<span><b>Beden:</b> ${esc(it.size)}</span>` : '',
              it.variant ? `<span><b>Varyant:</b> ${esc(it.variant)}</span>` : '',
              it.sku ? `<span><b>SKU:</b> ${esc(it.sku)}</span>` : '',
            ].filter(Boolean).join('');
            return `<div class="item">
              <div class="qbadge">${it.quantity}×</div>
              <div>
                <div class="pname">${esc(it.name)}</div>
                ${meta ? `<div class="pmeta">${meta}</div>` : ''}
              </div>
            </div>`;
          }).join('')
        : `<div class="empty">Bu sipariş için ürün ayrıntısı yok</div>`;
      modalBack.classList.add('open');
    }
    function closeProductModal() { modalBack.classList.remove('open'); }

    document.getElementById('delayBody').addEventListener('click', (e) => {
      const cell = e.target.closest('td.qty');
      if (!cell) return;
      const o = delayedList[Number(cell.dataset.index)];
      if (o) openProductModal(o);
    });
    document.getElementById('modalClose').addEventListener('click', closeProductModal);
    modalBack.addEventListener('click', (e) => { if (e.target === modalBack) closeProductModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeProductModal(); });

    let urgentList = [];
    function renderUrgent(list, configured) {
      const body = document.getElementById('urgentBody');
      if (!configured) {
        document.getElementById('urgentCount').textContent = '—';
        body.innerHTML = `<tr><td colspan="3"><div class="empty">Shopify henüz bağlanmadı</div></td></tr>`;
        return;
      }
      urgentList = list || [];
      list = urgentList;
      document.getElementById('urgentCount').textContent = list.length;
      document.getElementById('urgentCount').className = 'count' + (list.length ? ' alert' : '');
      if (!list.length) { body.innerHTML = `<tr><td colspan="3"><div class="empty">Acil etiketli açık sipariş yok</div></td></tr>`; return; }
      body.innerHTML = list.map((o, i) => `
        <tr>
          <td><span class="tag acil">ACİL</span> ${esc(o.name)}<button class="prodbtn" data-index="${i}" title="Ürün detayını gör">${boxIcon}</button></td>
          <td>${esc(o.customer || '—')}</td>
          <td>${fmtDateTime(o.createdAt)}</td>
        </tr>`).join('');
    }

    document.getElementById('urgentBody').addEventListener('click', (e) => {
      const btn = e.target.closest('.prodbtn');
      if (!btn) return;
      const o = urgentList[Number(btn.dataset.index)];
      if (o) openProductModal(o);
    });

    function renderMessages(d) {
      const box = document.getElementById('messages');
      let html = '';
      if (!d.configured.shopify) html += `<div class="notice">Shopify henüz bağlanmadı — üstteki Shopify sayıları ve alt tablo boş görünecek. Token eklenince otomatik dolacak.</div>`;
      if (!d.configured.trendyol) html += `<div class="notice">Trendyol henüz bağlanmadı — anahtarları ekleyin.</div>`;
      for (const e of (d.errors || [])) html += `<div class="err">${e}</div>`;
      box.innerHTML = html;
    }

    let lastOk = 0;
    let refreshTimer = null;
    // Sunucudan gelen refreshSeconds'a göre bir sonraki yenilemeyi planlar.
    // Değer değişirse (ör. REFRESH_SECONDS güncellenince) aralık kendini ayarlar.
    function scheduleNext() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(refresh, window.__refreshMs || 60000);
    }
    async function refresh() {
      try {
        const res = await fetch('/api/dashboard', { cache: 'no-store' });
        const d = await res.json();
        renderMessages(d);
        renderKpis(d);
        renderDelayed(d.trendyol?.delayed);
        renderUrgent(d.shopify?.urgent, d.configured.shopify);
        renderHistory(d.history);
        document.getElementById('updated').textContent = 'Güncellendi ' + fmtDateTime(d.updatedAt);
        lastOk = Date.now();
        document.getElementById('statusDot').className = 'dot';
        window.__refreshMs = (d.refreshSeconds || 60) * 1000;
      } catch (e) {
        document.getElementById('statusDot').className = 'dot stale';
        document.getElementById('updated').textContent = 'Bağlantı hatası — yeniden denenecek';
      } finally {
        scheduleNext(); // başarılı da olsa hata da olsa döngü sürsün
      }
    }

    function tickClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleString('tr-TR', { weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Europe/Istanbul' });
      // veri bayatladıysa noktayı sarıya çevir
      if (Date.now() - lastOk > (window.__refreshMs || 60000) * 2.5)
        document.getElementById('statusDot').className = 'dot stale';
    }

    refresh(); // ilk yükleme; sonraki yenilemeleri kendi içinde planlar
    tickClock();
    setInterval(tickClock, 1000);
  </script>
</body>
</html>
